 <style>
    /* 1. 날짜 및 시간 영역 레이아웃 - 왼쪽 정렬 및 간격 고정 */
    .datetime-wrap { flex: 1; width: 100%; }
    .datetime-row { 
        display: flex; 
        align-items: center; 
        gap: 6px;          /* 🚀 일자와 시간 사이 간격 (원하는 만큼 조절) */
        justify-content: flex-start; /* 🚀 오른쪽으로 밀리지 않게 왼쪽 정렬 */
        flex-wrap: nowrap; /* PC에서 한 줄 유지 */
    }

    /* 2. 날짜 입력창 크기 고정 - 다른 요소들을 밀어내지 않게 함 */
    .date-field { 
        position: relative; 
        width: 150px;      /* 🚀 날짜 박스 너비를 고정해서 시간이 바로 옆에 오게 함 */
        flex: 0 0 auto;    /* 🚀 공간을 혼자 다 차지(flex: 1.2)하지 않도록 수정 */
    }

    /* 시간 선택(Select)창 크기도 적당히 고정 */
    .datetime-row .input-sm {
        width: 70px !important; /* 🚀 시/분 박스 크기가 커지지 않게 고정 */
        flex: 0 0 auto;
        padding: 8px 5px;
    }

    /* 날짜 입력창 내부 텍스트(연/월/일) 흰색 강제 */
    input[type="date"].date-input {
        width: 100%;
        color: #ffffff !important;
        background: #0d1117;
        text-align: left;
    }

    /* 브라우저별 내부 텍스트 색상 대응 */
    input[type="date"].date-input::-webkit-datetime-edit-text,
    input[type="date"].date-input::-webkit-datetime-edit-month-field,
    input[type="date"].date-input::-webkit-datetime-edit-day-field,
    input[type="date"].date-input::-webkit-datetime-edit-year-field {
        color: #ffffff !important;
    }

    /* 안내 문구(placeholder) 위치 잡기 */
    .date-placeholder {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #9ca3af;
        font-size: 14px;
        pointer-events: none;
        transition: opacity 0.15s;
    }

    /* 날짜가 선택되면 placeholder 숨김 */
    input[type="date"]:valid + .date-placeholder,
    input[type="date"]:focus + .date-placeholder {
        opacity: 0;
    }

    /* 3. 모바일 최적화 (깨짐 방지) */
    @media (max-width: 640px) {
        .datetime-row { 
            flex-wrap: wrap; /* 모바일은 줄바꿈 */
        }
        .date-field { 
            min-width: 100%; 
            margin-bottom: 4px;
        }
        .datetime-row select {
            flex: 1;
            min-width: 80px;
        }
    }

    /* 4. 탭바 추가 보정 (통합 CSS 보조) */
    #order-cat-tabs {
        padding: 5px 0 15px 0;
    }

   #privacy-row label {
      font-size: 13px !important; /* 확실하게 줄이기 */
      color: #e5e7eb;           
      letter-spacing: -0.5px;    /* 글자 간격을 좁혀서 더 깔끔하게 */

   /* 공통으로 사용할 작은 보조 버튼 스타일 */

<script type="module">
  import { renderMenu, makeCart } from '/src/order/assets/js/modules/menu-cart.js';
  import { get } from '/src/order/assets/js/modules/cust-store.js';
  import { fillTimeSelectors, getTimeValue, isDayOff, checkBusinessHours, isManuallyBlocked } from '/src/order/assets/js/modules/time.js';
  import { INITIAL_STATUS } from '/src/shared/constants/status.js';
  import { supabaseMgr } from '/src/shared/supabase-manager.js';
  import { getDistanceKm, calculateDeliveryFee } from './assets/js/modules/delivery-util.js';

  let storeConfig = null;
  let currentOrderType = 'delivery'; // 기본값 배달
  let currentDeliveryFee = 0;
  let currentStoreBH = null;
  
  const adminChannel = new BroadcastChannel("qrnr-admin");
  const storeId = window.qrnrStoreId;
  let currentLookupOrderNo = null;
  
  // 🛠 수정: cart 변수를 전역에 선언하여 모든 함수에서 공유
  let cart = null;

  function esc(str) {
    if (!str) return "";
    return String(str).replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
  }

  function formatPhoneNumber(num) {
    if (!num) return "-";
    const cleanNum = num.replace(/\D/g, "");
    if (cleanNum.length === 11) {
        return cleanNum.replace(/(\d{3})(\d{4})(\d{4})/, "$1-$2-$3");
    } else if (cleanNum.length === 10) {
        return cleanNum.replace(/(\d{2,3})(\d{3,4})(\d{4})/, "$1-$2-$3");
    }
    return num;
  }

  export function showToast(msg, variant = 'info') {
    const t = document.createElement('div');
    t.className = `toast toast-${variant}`; 
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => {
        t.classList.remove('show');
        setTimeout(() => t.remove(), 200);
    }, 3000);
  }

  function fail(msg) {
    showToast(msg, 'error');
    document.getElementById("action-btn").disabled = false; 
    const confirmOkBtn = document.getElementById("confirm-ok");
    if (confirmOkBtn) confirmOkBtn.disabled = false;
    return false; 
  }

  // [기존 로직 유지] 예약 제출 함수
  async function submitReserve() {
    const addr1 = document.getElementById("addr").value.trim();
    const addr2 = document.getElementById("addr-detail").value.trim();
    const fullAddr = addr2 ? addr1 + " " + addr2 : addr1;
    const cust = document.getElementById("cust").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const memo = document.getElementById("memo").value.trim();
    const pw = document.getElementById("lookupPw").value.trim();
    const agree = document.getElementById("agree-privacy").checked;

    if (!agree) {fail("개인정보 수집·이용에 동의해주세요.");return;}
    if (currentOrderType === 'delivery' && !addr1) {
        return fail("배송지 주소를 입력해주세요.");
    }
    if (!cust) {
        return fail("주문자명을 입력해주세요.");
    }
    if (phone.length < 9) {fail("전화번호를 확인해주세요.");return;}
    if (pw.length !== 4) {fail("조회 비밀번호 4자리를 입력해주세요.");return;}
    if (!cart.items.length) {fail("장바구니가 비어 있습니다.");return;}

    const date = document.getElementById("date").value;
    const { ap, hh, mm } = getTimeValue("time") || {};
    if (!date || !ap || !hh || !mm) {
        return fail("예약 날짜와 시간을 정확히 선택해주세요.");
    }

    let hour24 = parseInt(hh);
    if (ap === "PM" && hour24 < 12) hour24 += 12;
    if (ap === "AM" && hour24 === 12) hour24 = 0;
    const timeStr = `${String(hour24).padStart(2, '0')}:${mm}`;
    const targetDT = new Date(`${date}T${timeStr}:00`);
    
    const rangeCheck = checkBusinessHours(currentStoreBH, targetDT);
    if (!rangeCheck.ok) return fail(rangeCheck.msg);

    const manualCheck = isManuallyBlocked(currentStoreBH, date, timeStr);
    if (!manualCheck.ok) return fail(manualCheck.msg);
    
    /*const selectedDateTime = new Date(`${date}T${String(hour24).padStart(2, '0')}:${mm}:00`);
    const now = new Date();
    if (selectedDateTime <= now) {
      fail("현재 시간보다 이후의 시간으로 예약해주세요.");
      return;
    }*/
    
    const payload = {
      storeId,
      type: 'reserve',
      amount: cart.total() + currentDeliveryFee,
      cart: cart.items.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price, optionText: i.optionText || [] })),
      customer: { name: cust, phone, fullAddr: currentOrderType === 'pickup' ? '[매장픽업]' : fullAddr, memo },
      meta: { 
        delivery_fee: currentDeliveryFee, 
        order_type: currentOrderType,
        reserve: { date, time: `${ap} ${hh}:${mm}` }, // 핵심: 이 구조가 DB meta에 저장됨
        memo: memo
      },
      lookupPw: pw,
      agreePrivacy: true
    };

    try {
      const r = await fetch("/api/orders", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!r.ok) throw new Error("서버 응답 오류");
      const j = await r.json();
      if (!j.ok) return fail(j.msg || "예약 저장 실패");

      const finalAmount = cart.total() + currentDeliveryFee;
      document.getElementById("reserve-amount").textContent = finalAmount.toLocaleString();
      document.getElementById("reserve-done-modal").style.display = "flex";
    } catch (error) {
      fail("서버와 통신 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
    }
  }

  // [기존 로직 유지] 계좌 정보 로드
  async function loadBankInfo() {
    try {
      const res = await fetch(`/api/store-settings?storeId=${storeId}`);
      const data = await res.json();
      if (data.ok && data.settings?.owner_bank) {
        const bank = data.settings.owner_bank;
        const b = typeof bank === 'string' ? JSON.parse(bank) : bank;
        if (b.bank && b.number) {
          document.getElementById("bank-text").textContent = `${b.bank} ${b.number}`;
          document.getElementById("bank-holder-display").textContent = `예금주: ${b.holder || ""}`;
        } else {
          document.getElementById("bank-text").textContent = "등록된 계좌 정보가 없습니다.";
        }
      }
    } catch (e) { console.error(e); }
  }

  // --- 🚀 [여기서부터 복사] 배달/픽업 전환 및 거리 계산 로직 ---
  window.setOrderType = function(type) {
    currentOrderType = type;
    document.querySelectorAll('.btn-type').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-type-${type}`).classList.add('active');

    const addrSection = document.getElementById('address-section');
    if (type === 'pickup') {
      addrSection.style.display = 'none';
      currentDeliveryFee = 0;
      if(document.getElementById('delivery-msg')) document.getElementById('delivery-msg').textContent = "";
    } else {
      addrSection.style.display = 'flex';
    }
    
    // 합계 금액 갱신 (배달비 포함)
    if (window.qrnrCart) {
        window.qrnrCart.render();
        const totalWithFee = window.qrnrCart.total() + currentDeliveryFee;
        document.getElementById("total").textContent = totalWithFee.toLocaleString();
    }
  };

  window.openAddr = () => {
    // 🚀 autoload=false 대응: 카카오 지도가 완전히 로드된 후 실행
    kakao.maps.load(() => {
        new window.daum.Postcode({ 
            oncomplete(data) { 
                const fullAddr = data.roadAddress || data.address;
                document.getElementById("addr").value = fullAddr; 
                document.getElementById("addr-detail").focus(); 

                const geocoder = new kakao.maps.services.Geocoder();
                geocoder.addressSearch(fullAddr, (result, status) => {
                    if (status === kakao.maps.services.Status.OK) {
                        const lat = parseFloat(result[0].y);
                        const lng = parseFloat(result[0].x);
                        
                        const dist = getDistanceKm(storeConfig.base_lat, storeConfig.base_lng, lat, lng);
                        const fee = calculateDeliveryFee(storeConfig, dist);

                        if (fee === -1) {
                            alert(`배달 가능 거리(${storeConfig.max_distance}km)를 초과했습니다.`);
                            document.getElementById("addr").value = "";
                            return;
                        }
                        
                        currentDeliveryFee = fee;
                        document.getElementById('delivery-msg').textContent = `🛵 배달거리: ${dist.toFixed(1)}km (배달비 +${fee.toLocaleString()}원)`;
                        
                        // 합계 금액 갱신 (화면 표시용)
                        if (window.qrnrCart) {
                            window.qrnrCart.render();
                            const totalWithFee = window.qrnrCart.total() + currentDeliveryFee;
                            document.getElementById("total").textContent = totalWithFee.toLocaleString();
                        }
                    }
                });
            } 
        }).open();
    });
};

  // 🚀 초기화 통합 함수 (실행 순서 보장)
  async function initApp() {
    // 1. 매장 설정(영업시간) 먼저 가져오기
    const sRes = await fetch(`/api/store-settings?storeId=${storeId}`);
    const sData = await sRes.json();
    currentStoreBH = sData.settings?.business_hours;
    const bh = currentStoreBH;
    storeConfig = sData.settings?.delivery_config;

    // 🚀 [추가] 관리자 설정에 따라 배달/픽업 버튼 숨김 처리
    if (storeConfig) {
        document.getElementById('btn-type-delivery').style.display = storeConfig.enabled ? 'block' : 'none';
        document.getElementById('btn-type-pickup').style.display = storeConfig.pickup_enabled ? 'block' : 'none';
        if (!storeConfig.enabled && storeConfig.pickup_enabled) setOrderType('pickup');
    }
    
    fillTimeSelectors("time");

    const dateInput = document.getElementById('date');
    if (!dateInput) return;
    dateInput.min = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().split("T")[0];

    // 날짜/시간 변경 시 영업 확인
    const checkValidTime = () => {
        const selectedDate = dateInput.value;
        if (!selectedDate) return;
        const { ap, hh, mm } = getTimeValue("time");
        if (!ap || !hh || !mm) return;
        let hour24 = parseInt(hh);
        if (ap === "PM" && hour24 < 12) hour24 += 12;
        if (ap === "AM" && hour24 === 12) hour24 = 0;
        const timeStr = `${String(hour24).padStart(2, '0')}:${mm}`;
        const targetDT = new Date(`${selectedDate}T${timeStr}:00`);

        if (isDayOff(currentStoreBH, selectedDate)) {
            showToast("선택하신 날짜는 휴무일입니다.", "error");
            return;
        }
        const rangeCheck = checkBusinessHours(currentStoreBH, targetDT);
        if (!rangeCheck.ok) { showToast(rangeCheck.msg, "error"); return; }
        const manualCheck = isManuallyBlocked(currentStoreBH, selectedDate, timeStr);
        if (!manualCheck.ok) showToast(manualCheck.msg, "error");
    };

    // 시간 선택 요소들에 이벤트 바인딩
    dateInput.addEventListener('change', checkValidTime);
    ['time-ap', 'time-hh', 'time-mm'].forEach(id => document.getElementById(id).addEventListener('change', checkValidTime));
    
    cart = makeCart("cart-box", "total");
    window.qrnrCart = cart;
    await renderMenu("menu-grid", cart);
    await loadBankInfo();
    initRealtimeSync();
  }

  function initRealtimeSync() {
    try {
      supabaseMgr.getChannel(storeId).then(channel => {
        if (!channel) return;
        // 🚀 [추가 시작] 관리자가 예약 상태를 바꿨을 때 화면의 글자를 즉시 고침
        channel.on('broadcast', { event: 'STATUS_CHANGED' }, (payload) => {
            const { orderId, status } = payload.payload;
            
            // 현재 내가 조회 중인 예약 번호와 관리자가 바꾼 번호가 일치할 때만 실행
            if (String(currentLookupOrderNo) === String(orderId)) {
                // 조회 결과 창에서 상태를 나타내는 태그(색상 배경이 있는 b 태그)를 찾아 글자 변경
                const badge = document.querySelector('#lookup-result-list b[style*="background"]');
                if (badge) {
                    badge.textContent = status;
                    // 상태에 따라 배경색 변경 (주문취소는 빨간색, 나머지는 초록색)
                    badge.style.background = (status === '주문취소') ? '#ef4444' : '#2ea043';
                    showToast(`🔔 예약 상태가 [${status}]로 변경되었습니다.`, "info");
                }
            }
        });
        channel.on('broadcast', { event: 'RELOAD_SIGNAL' }, async (payload) => {
        const updateType = payload.payload.type;
        const sRes = await fetch(`/api/store-settings?storeId=${storeId}`);
        const sData = await sRes.json();
        currentStoreBH = sData.settings?.business_hours;
        storeConfig = sData.settings?.delivery_config;

        if (updateType === 'menu_update' || !updateType) await renderMenu("menu-grid", cart);
        if (updateType === 'bank_update' || !updateType) await loadBankInfo();
        showToast("📋 매장 설정이 실시간으로 업데이트되었습니다.", "info");
      });
    });
  } catch (e) { console.error(e); }
  }

  // --- 이벤트 리스너 (원본 유지) ---
  document.getElementById("bank-copy").onclick = () => {
    const bankNumber = document.getElementById("bank-text").textContent;
    if (!bankNumber || bankNumber.includes("등록된")) return showToast("복사할 계좌 정보가 없습니다.", "error");
    navigator.clipboard.writeText(bankNumber).then(() => showToast("계좌번호가 복사되었습니다.", "info"));
  };

  
  document.querySelector(".addr-label").onclick = window.openAddr;
  document.getElementById("addr").onclick = window.openAddr;

  document.getElementById("phone").addEventListener("input", e => e.target.value = e.target.value.replace(/\D/g, ""));
  document.getElementById("lookupPw").addEventListener("input", e => e.target.value = e.target.value.replace(/\D/g, "").slice(0, 4));

  document.getElementById("action-btn").onclick = () => {
    if (!cart.items.length) return showToast("장바구니가 비어 있습니다.",'info');
    const date = document.getElementById("date").value;
    const { ap, hh, mm } = getTimeValue("time") || {};
    if (!date || !ap || !hh || !mm) return showToast("예약 날짜와 시간을 선택해주세요.", "info");

    let itemSummary = cart.items.map(i => `• ${i.name} x${i.qty}`).join('\n');
    
    // 🛵 배달비 항목 추가 표시
    if (currentOrderType === 'delivery' && currentDeliveryFee > 0) {
        itemSummary += `\n\n🛵 배달비: ${currentDeliveryFee.toLocaleString()}원`;
    }

    document.getElementById('confirm-items').textContent = itemSummary;
    document.getElementById("confirm-total").textContent = (cart.total() + currentDeliveryFee).toLocaleString();
    document.getElementById("confirm-datetime").textContent = `${date} ${ap} ${hh}:${mm}`;
    document.getElementById("confirm-modal").style.display = "flex";
  };

  document.getElementById("confirm-ok").onclick = async () => {
    const btn = document.getElementById("confirm-ok");
    btn.disabled = true; btn.textContent = "처리 중…";
    document.getElementById("confirm-modal").style.display = "none";
    try { await submitReserve(); } finally { btn.disabled = false; btn.textContent = "확인"; }
  };

  document.getElementById("confirm-cancel").onclick = () => {
    document.getElementById("confirm-modal").style.display = "none";
    document.getElementById("action-btn").disabled = false;
  };

  document.getElementById("reserve-done-ok").onclick = () => { location.reload(); };

  document.getElementById("privacy-open").onclick = async () => {
    try {
      const res = await fetch(`/api/store-settings?storeId=${storeId}`);
      const data = await res.json();
      document.getElementById("privacy-modal-body").textContent = data.ok && data.settings?.privacy_policy ? data.settings.privacy_policy : "등록된 방침이 없습니다.";
      document.getElementById("privacy-modal").style.display = "flex";
    } catch (e) { showToast("데이터 로드 실패",'error'); }
  };
  document.getElementById("privacy-close").onclick = () => document.getElementById("privacy-modal").style.display = "none";

  // 🔍 [원본 HTML 유지] 내 예약 조회 로직
  document.getElementById('btn-open-lookup').onclick = () => document.getElementById('lookup-modal').style.display = 'flex';
  // lookup-close 클릭 시
  document.getElementById('lookup-close').onclick = () => {
      document.getElementById('lookup-modal').style.display = 'none';
      currentLookupOrderNo = null; // 감시 해제
  };
  document.getElementById('result-close').onclick = () => document.getElementById('result-modal').style.display = 'none';

  document.getElementById('look-phone').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, "").replace(/^(\d{2,3})(\d{3,4})(\d{4})$/, `$1-$2-$3`);
  });

  document.getElementById('btn-do-lookup').onclick = async () => {
    const name = document.getElementById('look-name').value.trim();
    const cleanPhone = document.getElementById('look-phone').value.trim();
    const pw = document.getElementById('look-pw').value.trim();
    const phone = cleanPhone.replace(/\D/g, "");
    if (!name || !phone || !pw) return showToast("모든 정보를 입력하세요.", "info");

    
    if (phone.length < 10 || phone.length > 11) {
        return showToast("연락처를 전체 번호로 올바르게 입력해주세요.", "error");
    }

    const btn = document.getElementById('btn-do-lookup');
    btn.disabled = true; 
    btn.textContent = "조회 중...";

    try {
      const res = await fetch('/api/orders/lookup', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ name, phone, pw, storeId })
      });
      const data = await res.json();

      if (data.ok && data.orders.length > 0) {
        currentLookupOrderNo = data.orders[0].id;
        document.getElementById('lookup-result-list').innerHTML = data.orders.map(o => {
          const itemsHtml = o.items.map(i => {
            let optStr = "";
            if (i.optionText && i.optionText.length > 0) {
              const opts = i.optionText.map(t => esc(t.split(':')[1])).join(', ');
              optStr = `<div style="font-size:11px; color:#9ca3af; margin-left:10px;">└ 옵션: ${opts}</div>`;
            }
            return `<div style="margin-bottom:4px;">• ${esc(i.name)} x${i.qty} ${optStr}</div>`;
          }).join('');

          const meta = o.meta || {};
          const resDate = meta.reserve?.date || '-';
          const resTime = meta.reserve?.time || '-';
          const memo = meta.memo || '없음';

          // ⚠️ 여기 백틱 내부의 HTML은 사용자님의 원본을 한 글자도 바꾸지 않았습니다.
          // delivery-guest.html 내 조회 결과 생성 부분 수정
          return `
              <div class="order-card" data-oid="${o.id}" style="background:#161b22; padding:15px; border-radius:12px; border:1px solid #2ea043; line-height:1.6; font-size:13px; margin-bottom:10px;">
                  <div class="hstack" style="justify-content:space-between; border-bottom:1px solid #263241; padding-bottom:8px; margin-bottom:10px;">
                      <b style="color:#2ea043; font-size:14px;">예약번호: ${esc(o.id.split('-').pop())}</b>
                      
                      <b class="status-badge" style="background:${o.status === '주문취소' ? '#ef4444' : '#2ea043'}; padding:2px 8px; border-radius:4px; font-size:11px;">
                          ${esc(o.status)}
                      </b>
                  </div>
                  
                  <div style="margin-bottom:8px;">
                      <div style="color:#9ca3af; font-size:11px;">📍 배송지 / 주문자</div>
                      <div>${esc(o.address) || '-'}</div>
                      <div>${esc(o.customer_name)} (${formatPhoneNumber(esc(o.customer_phone))})</div>
                  </div>
          
                  <div style="margin-bottom:8px;">
                      <div style="color:#9ca3af; font-size:11px;">⏰ 예약 일시</div>
                      <div style="color:#f97316; font-weight:bold;">${esc(resDate)} ${esc(resTime)}</div>
                  </div>
          
                  <div style="margin-bottom:8px;">
                      <div style="color:#9ca3af; font-size:11px;">💬 요청사항</div>
                      <div style="font-style:italic;">"${esc(memo)}"</div>
                  </div>
          
                  <div style="margin-bottom:8px; background:#0d1117; padding:8px; border-radius:8px;">
                      <div style="color:#9ca3af; font-size:11px; margin-bottom:4px;">📦 주문 메뉴</div>
                      ${itemsHtml}
                  </div>
          
                  <div style="text-align:right; font-weight:bold; font-size:15px; color:#2ea043; margin-top:10px;">
                      최종 결제 금액: ${Number(o.amount).toLocaleString()}원
                  </div>
              </div>
          `;
        }).join('');
        document.getElementById('lookup-modal').style.display = 'none';
        document.getElementById('result-modal').style.display = 'flex';
      } else {
        showToast("일치하는 예약 내역이 없습니다.", "error");
      }
    }
    catch (e) {
        showToast("조회 중 오류가 발생했습니다.", "error");
    }
    finally {
      btn.disabled = false; 
      btn.textContent = "조회하기";
    }
  };

  document.addEventListener("DOMContentLoaded", initApp);
</script>
