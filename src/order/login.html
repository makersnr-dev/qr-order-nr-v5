<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="/src/admin/assets/css/style.css"/>
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<title>배달/예약 로그인</title>
</head>
<body>

<div class="container">
  <h1>배달/예약 로그인</h1>

  <div class="card vstack" style="max-width:520px;margin:0 auto">
    <input id="uid" class="input" placeholder="아이디">
    <input id="pwd" class="input" placeholder="비밀번호" type="password">

    <button id="login" class="btn primary">로그인</button>

    <div class="hstack small" style="justify-content:space-between">
      <a>아이디 찾기</a>
      <a>비밀번호 찾기</a>
      <a href="/src/order/join.html">회원가입</a>
    </div>
  </div>
</div>

<!-- 고객 로그인 -->
<script type="module">
  import { saveToken } from '/src/order/assets/js/modules/cust-auth.js';
  import { ensureStoreInitialized, isValidStoreId } from "/src/shared/store.js";
  const currentSid = ensureStoreInitialized();
  window.qrnrStoreId = currentSid;

  document.getElementById('login').onclick = async () => {
  const uid = document.getElementById('uid').value.trim();
  const pwd = document.getElementById('pwd').value.trim();

  if (!uid || !pwd) {
    alert('아이디와 비밀번호를 입력하세요.');
    return;
  }

  const r = await fetch('/api/login-cust', {
    method : 'POST',
    headers : { 'content-type': 'application/json' },
    body : JSON.stringify({ uid, pwd })
  });

  let data = null;
  try {
    data = await r.json();
  } catch (_) {}

  if (r.ok && data && data.token) {
      saveToken(data.token);

      // 🚀 최종 이동 전 다시 한 번 ID 검증 (수문장 재확인)
      let finalSid = window.qrnrStoreId;
      if (!isValidStoreId(finalSid)) {
          finalSid = ensureStoreInitialized(); // 오염되었다면 재추출 및 정화
      }

      location.href = `/src/order/delivery.html?store=${encodeURIComponent(finalSid)}`;
    }
};
</script>

</body>
</html>
