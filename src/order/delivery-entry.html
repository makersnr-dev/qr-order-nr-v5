<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>주문 시작</title>
    <link rel="stylesheet" href="/src/order/assets/css/style.css">
    <style>
        .entry-container {
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            color: #fff;
        }
        .store-logo {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .entry-card {
            background: #1c2632;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #263241;
            margin-bottom: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            color: #fff;
        }
        .entry-card:active {
            transform: scale(0.98);
        }
        .entry-card p { color: #9ca3af; }
    </style>
</head>
<body>

<div class="entry-container">
    <div id="store-logo-box" class="store-logo">🏠</div>
    <h2 id="store-name" style="margin-bottom: 8px;">매장 정보를 불러오는 중...</h2>
    <p id="store-status" class="small" style="margin-bottom: 40px; opacity: 0.7;">잠시만 기다려주세요.</p>

    <div class="vstack" style="gap: 16px;">
        <div class="entry-card" id="btn-guest">
            <h3 style="color: var(--primary); margin-bottom: 4px;">비회원 주문하기</h3>
            <p class="small">로그인 없이 바로 주문해요.</p>
        </div>

        <div class="entry-card" id="btn-login">
            <h3 style="margin-bottom: 4px;">회원 로그인</h3>
            <p class="small">주소를 저장하고<br>지난 주문 내역을 쉽게 확인해요.</p>
        </div>
    </div>

   
</div>

<script type="module">
    import { ensureStoreInitialized } from '/src/shared/store.js';
    import { currentStoreId, loadStoreInfo } from '/src/order/assets/js/modules/cust-store.js';

    async function init() {
        const storeId = ensureStoreInitialized();
        window.qrnrStoreId = storeId;
        const storeNameEl = document.getElementById('store-name');
        const storeStatusEl = document.getElementById('store-status');
        const guestBtn = document.getElementById('btn-guest');
        const loginBtn = document.getElementById('btn-login');

        try {
            // 🚀 1. DB에서 실시간 매장 정보 로드
            const info = await loadStoreInfo();
            storeNameEl.textContent = info.name;
            
            if (info.active) {
                storeStatusEl.innerHTML = '**<span style="color:#2ea043">●</span>** 영업 중입니다.';
            } else {
                storeStatusEl.innerHTML = '<span style="color:#ef4444">●</span> 지금은 영업 준비 중입니다.';
                // 영업 중이 아닐 때 버튼 비활성화 시키려면 아래 주석 해제
                // guestBtn.style.opacity = '0.5';
                // guestBtn.style.pointerEvents = 'none';
            }

            // 🚀 2. 버튼 클릭 이벤트 (storeId 유지하며 이동)
            guestBtn.onclick = () => {
                location.href = `/src/order/delivery-guest.html?store=${encodeURIComponent(storeId)}`;
            };

            loginBtn.onclick = () => {
                location.href = `/src/order/login.html?store=${encodeURIComponent(storeId)}`;
            };

        } catch (e) {
            console.error(e);
            storeNameEl.textContent = '방문해주셔서 감사합니다';
            storeStatusEl.textContent = '매장 정보를 확인할 수 없습니다.';
        }
    }

    init();
</script>

</body>
</html>
